name: Backend Proxy Fallback

on:
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend-proxy-fallback.yml'
  workflow_dispatch:

jobs:
  proxy-fallback-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run proxy fallback tests
        run: |
          python -m pytest \
            backend/tests/test_audio_extractor.py \
            backend/tests/test_rapidapi_downloader.py \
            backend/tests/test_warp_rotator.py \
            -m "not integration" \
            -q
